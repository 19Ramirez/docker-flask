name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: docker-flask
  IMAGE_TAG: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Descargar Código
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔐 Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: 🏗️ Construir y Publicar la imagen de Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Usamos todo en minúsculas de forma estricta para evitar fallos en GHCR
          tags: ghcr.io/19ramirez/docker-flask:1.0.0
        
      - name: 📤 Pasar stack.yml al servidor (landinga)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/${{ secrets.VPS_USER }}/landinga"
    
      - name: 🚀 Despliegue del servicio en Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Iniciando secuencia de despliegue"        
            cd ~/landinga

            echo "==> Autenticando Docker en el VPS..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "==> Descargando la nueva imagen desde GHCR..."
            docker pull ghcr.io/19ramirez/docker-flask:1.0.0

            echo "==> Desplegando stack en Swarm..."
            docker stack deploy -c stack.yml --with-registry-auth borrar
            
            echo "==> Estado actual del servicio:"
            docker stack services borrar