version: '3.9'

services:
  tecticom:
    image: ghcr.io/19ramirez/francisco:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.francisco.entrypoints=http"
        - "traefik.http.routers.francisco.rule=Host(`francisco.byronrm.com`)"
        - "traefik.http.middlewares.francisco-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.francisco.middlewares=francisco-https-redirect"
        - "traefik.http.routers.francisco-secure.entrypoints=https"
        - "traefik.http.routers.francisco-secure.rule=Host(`francisco.byronrm.com`)"
        - "traefik.http.routers.francisco-secure.tls=true"
        - "traefik.http.routers.francisco-secure.tls.certresolver=http"
        - "traefik.http.routers.francisco-secure.service=francisco"
        - "traefik.http.services.francisco.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true