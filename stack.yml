version: '3.8'

services:
  app:
    # Usamos la imagen que se construye en tu GitHub Container Registry
    image: ghcr.io/19ramirez/docker-flask:1.0.0
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Configuración exclusiva para tu subdominio calculadora (Usando tu apellido para que no choque)
        - "traefik.http.routers.ramirez-calc-router.entrypoints=http"
        - "traefik.http.routers.ramirez-calc-router.rule=Host(`calculadora.byronrm.com`)"
        - "traefik.http.middlewares.ramirez-calc-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.ramirez-calc-router.middlewares=ramirez-calc-redirect"
        
        - "traefik.http.routers.ramirez-calc-secure.entrypoints=https"
        - "traefik.http.routers.ramirez-calc-secure.rule=Host(`calculadora.byronrm.com`)"
        - "traefik.http.routers.ramirez-calc-secure.tls=true"
        - "traefik.http.routers.ramirez-calc-secure.tls.certresolver=http"
        - "traefik.http.routers.ramirez-calc-secure.service=ramirez-calc-service"
        
        # Traefik redirige el tráfico al puerto 5000 interno de tu Flask de forma segura
        - "traefik.http.services.ramirez-calc-service.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true