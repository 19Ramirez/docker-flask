version: '3.8'

services:
  tecticom:
    image: ghcr.io/19ramirez/docker-flask:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.docker-flask:1.0.0.entrypoints=http"
        - "traefik.http.routers.docker-flask:1.0.0.rule=Host(`docker-flask.byronrm.com`)"
        - "traefik.http.middlewares.docker-flask:1.0.0-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.docker-flask:1.0.0.middlewares=docker-flask:1.0.0-https-redirect"
        - "traefik.http.routers.docker-flask:1.0.0-secure.entrypoints=https"
        - "traefik.http.routers.docker-flask:1.0.0-secure.rule=Host(`docker-flask.byronrm.com`)"
        - "traefik.http.routers.docker-flask:1.0.0-secure.tls=true"
        - "traefik.http.routers.docker-flask:1.0.0-secure.tls.certresolver=http"
        - "traefik.http.routers.docker-flask:1.0.0-secure.service=docker-flask:1.0.0"
        - "traefik.http.services.docker-flask:1.0.0.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true